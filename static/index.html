<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Meet - Black & Orange</title>
    <style>
        :root {
            --c-black: #080808;
            --c-white: #ffffff;
            --c-orange: #f97316;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--c-black); color: var(--c-white);
            height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px;
        }

        /* --- Login Screen --- */
        #login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #login-screen { width: 100%; max-width: 400px; padding: 40px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
        #login-screen h2 { font-size: 28px; letter-spacing: 2px; text-transform: uppercase; color: var(--c-white); }
        #login-screen h2 span { color: var(--c-orange); }
        
        input {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: var(--c-white); font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--c-white); }
        
        .btn-primary {
            background: var(--c-white); color: var(--c-black); border: none; padding: 15px;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { background: var(--c-orange); color: var(--c-white); }

        /* --- Meet Screen & Workspace --- */
        #meet-screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        #waiting-room { display: none; flex: 1; align-items: center; justify-content: center; flex-direction: column; font-size: 22px; color: #888; text-align: center; padding: 20px;}
        
        .workspace { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; position: relative;}

        /* کپسول‌های ویدیو */
        #video-grid {
            flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px; align-content: center; overflow-y: auto; padding-right: 5px;
        }

        .video-container {
            position: relative; background: #000; border-radius: 24px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--glass-border);
            transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        /* رفع باگ کراپ شدن اسکرین شیر */
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        .label {
            position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8);
            padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2); color: var(--c-white);
        }

        .admin-actions { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; }
        .admin-actions button {
            background: rgba(0,0,0,0.8); color: var(--c-white); border: 1px solid var(--glass-border);
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold;
        }
        .admin-actions button:hover { background: var(--c-orange); border-color: var(--c-orange); }

        .pin-btn {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border); color: var(--c-white); width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10;
        }
        .pin-btn.active { background: var(--c-orange); border-color: var(--c-orange); color: var(--c-black); }
        .pin-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* استایل‌های پین و فول‌اسکرین با CSS */
        .video-container.pinned { grid-column: 1 / -1; height: 70vh; }
        .video-container.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: calc(100dvh - 85px); z-index: 100; border-radius: 0; border: none; }
        
        /* پاپ‌آپ (PiP) برای وب‌کم خودمان */
        .video-container.pip {
            position: fixed; bottom: 100px; right: 20px; width: 180px; height: auto;
            aspect-ratio: 16/9; z-index: 1001; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.9); border: 2px solid var(--c-orange);
        }

        /* --- Sidebar Chat --- */
        .sidebar { width: 320px; display: none; flex-direction: column; background: #0a0a0a;}
        .sidebar.show { display: flex; }
        .chat-header { font-weight: bold; padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;}
        .close-chat { background: none; border: none; cursor: pointer; font-size: 24px; color: var(--c-white);}
        #chat-messages { flex: 1; overflow-y: auto; font-size: 14px; padding: 15px;}
        .chat-msg { margin-bottom: 12px; line-height: 1.5; color: #ccc; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px;}
        .chat-msg b { color: var(--c-white); display: block; margin-bottom: 4px; font-size: 12px;}
        .chat-input { display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--glass-border);}
        .chat-input input { flex: 1; padding: 10px 15px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); color: var(--c-white);}
        .chat-input button { background: var(--c-white); color: var(--c-black); border: none; border-radius: 6px; padding: 0 15px; font-weight: bold; cursor: pointer;}
        .chat-input button:hover { background: var(--c-orange); color: var(--c-white);}

        /* --- Bottom Bar --- */
        .bottom-bar {
            height: 85px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            gap: 15px; background: #050505; border-top: 1px solid var(--glass-border); position: relative; z-index: 150;
        }

        .ctrl-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--c-white); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .ctrl-btn:hover { border-color: var(--c-white); background: rgba(255,255,255,0.1); }
        .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* دکمه‌های فعال/خاموش با رنگ نارنجی */
        .ctrl-btn.active-orange { background: var(--c-orange); border-color: var(--c-orange); color: var(--c-white); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        @media (max-width: 768px) {
            .workspace { padding: 10px; }
            #video-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;}
            .sidebar { position: fixed; top: 0; left: 0; width: 100vw; height: calc(100dvh - 85px); z-index: 200; border-radius: 0; background: var(--c-black); }
            .video-container.pip { width: 130px; bottom: 95px; right: 10px; }
            .video-container.pinned { height: 40vh; }
        }
    </style>
</head>
<body>

    <div id="login-wrapper">
        <div id="login-screen" class="glass-panel">
            <h2>Black <span>Meet</span></h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 10px;">Secure Connection</p>
            <input type="text" id="username" placeholder="Your Name" autocomplete="off" autocapitalize="words">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="login()">Enter Room</button>
        </div>
    </div>

    <div id="meet-screen">
        <div id="waiting-room">
            <p style="color: var(--c-white);">Session Paused by Host</p>
            <p style="font-size: 15px; margin-top: 10px;">Please wait...</p>
        </div>

        <div class="workspace" id="main-workspace">
            <div id="video-grid">
                <div class="video-container" id="local-container" title="Double click to fullscreen">
                    <button class="pin-btn" onclick="togglePin('local-container')" title="Pin video">
                        <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
                    </button>
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="label">You (<span id="role-display"></span>)</div>
                </div>
            </div>

            <div class="sidebar glass-panel" id="chat-sidebar">
                <div class="chat-header">
                    Messages
                    <button class="close-chat" onclick="toggleChat()">×</button>
                </div>
                <div id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Message...">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button class="ctrl-btn" id="btn-mic" onclick="toggleAudio()" title="Microphone"></button>
            <button class="ctrl-btn" id="btn-cam" onclick="toggleVideo()" title="Camera"></button>
            <button class="ctrl-btn" onclick="toggleScreenShare()" title="Share Screen" id="btn-share">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h3v3h8v-3h3l-7-7-7 7z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="toggleChat()" title="Chat">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
            </button>
            
            <span id="admin-controls" style="display: none; border-left: 1px solid var(--glass-border); padding-left: 15px; margin-left: 5px;">
                <button class="ctrl-btn active-orange" id="btn-meeting-state" onclick="toggleMeetingState()" title="End Meeting" style="width: 80px; border-radius: 25px;">
                </button>
            </span>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
