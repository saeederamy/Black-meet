<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Meet - Glossy Pro</title>
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            --text-light: #ffffff;
            --btn-blue: #3b82f6;
            --btn-red: #ef4444;
            --btn-green: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.04), transparent 25%);
            color: var(--text-light);
            height: 100vh; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
            border-radius: 16px; box-shadow: var(--glass-shadow);
        }

        /* --- Login Screen --- */
        #login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #login-screen { width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
        #login-screen h2 { font-size: 26px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        input {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border); border-radius: 10px;
            color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .btn-primary {
            background: #fff; color: #000; border: none; padding: 15px;
            border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { background: #e2e2e2; box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* --- Meet Screen & Workspace --- */
        #meet-screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        #waiting-room { display: none; flex: 1; align-items: center; justify-content: center; flex-direction: column; font-size: 22px; color: #bbb; text-align: center; padding: 20px;}
        
        .workspace { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; position: relative;}

        #video-grid {
            flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; align-content: center; overflow-y: auto; padding-right: 5px;
        }

        .video-container {
            position: relative; background: rgba(0,0,0,0.5); border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: all 0.3s ease;
        }

        /* رفع مشکل کراپ: استفاده از contain */
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        .label {
            position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); padding: 5px 12px; border-radius: 6px;
            font-size: 13px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold;
        }

        /* دکمه‌های ادمین روی ویدیوهای بقیه */
        .admin-actions {
            position: absolute; top: 10px; left: 10px; display: flex; gap: 5px;
        }
        .admin-actions button {
            background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--glass-border);
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px;
        }
        .admin-actions button:hover { background: rgba(255,0,0,0.6); }

        .pin-btn {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border); color: white; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10;
        }
        .pin-btn.active { background: #fff; color: #000; }
        .pin-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* استایل‌های پین و فول‌اسکرین با CSS (برای کارکرد صحیح PiP) */
        .video-container.pinned { grid-column: 1 / -1; height: 60vh; }
        .video-container.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: calc(100dvh - 90px); z-index: 100; border-radius: 0; }
        
        /* پاپ‌آپ ویدیوی خودمان (PiP) */
        .video-container.pip {
            position: fixed; bottom: 110px; right: 20px; width: 160px; height: auto;
            aspect-ratio: 16/9; z-index: 1001; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.2);
        }

        /* --- Sidebar Chat --- */
        .sidebar {
            width: 320px; display: none; flex-direction: column;
        }
        .sidebar.show { display: flex; }
        .chat-header { font-weight: bold; padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px;}
        .close-chat { background: none; border: none; cursor: pointer; font-size: 24px; color: #fff;}
        #chat-messages { flex: 1; overflow-y: auto; font-size: 14px; padding: 15px 5px 15px 15px;}
        .chat-msg { margin-bottom: 12px; line-height: 1.5; color: #ddd; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px;}
        .chat-msg b { color: #fff; display: block; margin-bottom: 4px; font-size: 12px; color: var(--btn-blue);}
        .chat-input { display: flex; gap: 10px; margin-top: 10px; padding: 15px; border-top: 1px solid var(--glass-border);}
        .chat-input input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white;}
        .chat-input button { background: #fff; color: #000; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer;}

        /* --- Bottom Bar --- */
        .bottom-bar {
            height: 90px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            gap: 15px; background: rgba(5, 5, 5, 0.8);
            border-top: 1px solid var(--glass-border); backdrop-filter: blur(20px); position: relative; z-index: 150;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .ctrl-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .ctrl-btn svg { width: 24px; height: 24px; fill: currentColor; }

        .ctrl-btn.active-blue { background: var(--btn-blue); border-color: var(--btn-blue); }
        .ctrl-btn.active-red { background: var(--btn-red); border-color: var(--btn-red); }
        .ctrl-btn.active-green { background: var(--btn-green); border-color: var(--btn-green); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        @media (max-width: 768px) {
            #video-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .sidebar { position: fixed; top: 0; left: 0; width: 100vw; height: calc(100dvh - 90px); z-index: 200; border-radius: 0; background: rgba(10,10,10,0.95); }
            .video-container.pip { width: 100px; bottom: 100px; right: 10px; }
        }
    </style>
</head>
<body>

    <div id="login-wrapper">
        <div id="login-screen" class="glass-panel">
            <h2>Black Meet</h2>
            <p style="color: #999; font-size: 14px; margin-bottom: 10px;">Glossy Workspace</p>
            <input type="text" id="username" placeholder="Your Name" autocomplete="off" autocapitalize="words">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="login()">Connect</button>
        </div>
    </div>

    <div id="meet-screen">
        <div id="waiting-room">
            <svg style="width: 64px; fill: #fff; margin-bottom: 20px; opacity: 0.5;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <p>Meeting Paused</p>
            <p style="font-size: 15px; margin-top: 10px; color: #888;">Waiting for host...</p>
        </div>

        <div class="workspace" id="main-workspace">
            <div id="video-grid">
                <div class="video-container" id="local-container" title="Double click to fullscreen">
                    <button class="pin-btn" onclick="togglePin('local')" title="Pin video">
                        <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
                    </button>
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="label">You (<span id="role-display"></span>)</div>
                </div>
            </div>

            <div class="sidebar glass-panel" id="chat-sidebar">
                <div class="chat-header">
                    Live Chat
                    <button class="close-chat" onclick="toggleChat()">×</button>
                </div>
                <div id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Message...">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button class="ctrl-btn active-green" id="btn-mic" onclick="toggleAudio()" title="Microphone"></button>
            <button class="ctrl-btn active-blue" id="btn-cam" onclick="toggleVideo()" title="Camera"></button>
            <button class="ctrl-btn" onclick="toggleScreenShare()" title="Share Screen" id="btn-share">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h3v3h8v-3h3l-7-7-7 7z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="toggleChat()" title="Chat">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
            </button>
            
            <span id="admin-controls" style="display: none; border-left: 1px solid var(--glass-border); padding-left: 15px; margin-left: 5px;">
                <button class="ctrl-btn active-red" id="btn-meeting-state" onclick="toggleMeetingState()" title="End Meeting" style="width: 80px; border-radius: 30px;">
                </button>
            </span>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
