<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Meet</title>
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --highlight: #ffffff;
            --danger: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 70%);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        /* Login Screen */
        #login-screen {
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #login-screen h2 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--highlight); }

        .btn-primary {
            background: var(--highlight);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #e0e0e0;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Meet Screen */
        #meet-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
        }

        .workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 90px);
        }

        #video-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            align-content: center;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            aspect-ratio: 16 / 9;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .admin-video-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }
        
        .admin-video-controls button {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Sidebar Chat */
        .sidebar {
            flex: 1;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-header {
            font-weight: bold;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            font-size: 14px;
        }

        .chat-msg { margin-bottom: 10px; line-height: 1.4; color: #ccc;}
        .chat-msg b { color: #fff; }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .chat-input button {
            background: var(--highlight);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Bottom Bar */
        .bottom-bar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .ctrl-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .ctrl-btn.danger { color: var(--danger); border-color: rgba(255, 51, 51, 0.3); }
        .ctrl-btn.danger:hover { background: rgba(255, 51, 51, 0.2); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="glass">
        <h2>Black Meet</h2>
        <p style="color: #888; font-size: 13px;">Secure Connection</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-primary" onclick="login()">Connect</button>
    </div>

    <div id="meet-screen">
        <div class="workspace">
            <div id="video-grid">
                <div class="video-container">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="label">You (<span id="role-display"></span>)</div>
                </div>
            </div>

            <div class="sidebar glass">
                <div class="chat-header">💬 Live Chat</div>
                <div id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Message...">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button class="ctrl-btn" onclick="toggleAudio()" title="Microphone">🎙️</button>
            <button class="ctrl-btn" onclick="toggleVideo()" title="Camera">📷</button>
            <button class="ctrl-btn" onclick="toggleScreenShare()" title="Screen Share">💻</button>
            
            <span id="admin-controls" style="display: none; border-left: 1px solid var(--glass-border); padding-left: 15px; margin-left: 5px;">
                <button class="ctrl-btn danger" onclick="endCall()" title="End Call for All">🛑</button>
            </span>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
